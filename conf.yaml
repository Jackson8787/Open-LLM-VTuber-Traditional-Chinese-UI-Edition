# ===========================
# 這是中文版的設定檔。
# 部分設定項目已調整為較適合中文使用者的預設值，方便直接開始使用。
# 如果你希望使用英文版本，請用 config_templates/conf.default.yaml 的內容取代本檔案。
# ===========================

# 系統設定：與伺服器初始化相關的設定
system_config:
  conf_version: 'v1.2.1' # 設定檔版本
  host: 'localhost' # 伺服器監聽位址，'0.0.0.0' 表示監聽所有網路介面；若需更安全，可使用 '127.0.0.1'（僅限本機存取）
  port: 12393 # 伺服器監聽的連接埠
  config_alts_dir: 'characters' # 用於存放替代設定的目錄
  tool_prompts: # 要插入角色提示詞中的工具提示詞
    live2d_expression_prompt: 'live2d_expression_prompt' # 會附加在系統提示詞末尾，讓 LLM（大型語言模型）包含控制表情的關鍵字。支援的關鍵字會自動載入到 `[<insert_emomap_keys>]` 的位置。
    # 啟用 think_tag_prompt 可讓不具備思考輸出的 LLM 也能展示內心想法、心理活動與動作（以括號形式呈現），但不會進行語音合成。更多細節請參考 think_tag_prompt。
    # think_tag_prompt: 'think_tag_prompt'
    # live_prompt: 'live_prompt'
    # 使用群聊時，此提示詞會加入每個 AI 參與者的記憶中。
    group_conversation_prompt: 'group_conversation_prompt'
    # 啟用 mcp_prompt 可讓 LLM 具備透過 MCP（Model Context Protocol）使用工具的能力。
    # 請注意：是否使用 mcp_prompt 由 Agent 決定。
    mcp_prompt: 'mcp_prompt'
    # 當 AI 被要求主動說話時使用的提示詞
    proactive_speak_prompt: 'proactive_speak_prompt'
    # 用來加強 LLM 輸出可發音文字的提示詞
    # speakable_prompt: 'speakable_prompt'
    # 額外指導 LLM 如何使用工具的提示詞
    # tool_guidance_prompt: 'tool_guidance_prompt' 

# 預設角色的設定
character_config:
  conf_name: 'mao_pro' # 角色設定檔案的名稱
  conf_uid: 'mao_pro_001' # 角色設定的唯一識別碼
  live2d_model_name: 'mao_pro' # Live2D 模型名稱
  character_name: 'Mao' # 將在群聊中使用，并顯示为 AI 的名稱。
  avatar: 'mao.png' # 建議使用正方形影像作为头像。將其保存到 avatars 檔案夹中。留空则使用角色名稱的首字母作为头像。
  human_name: 'Human' # 將在群聊中使用，并顯示为人類的名稱。

  # ============== 提示詞 ==============

  # 只需在下面输入你想使用的人格提示。
  # 如果你想创建多个角色并在它们之间切换，请在 characters 檔案夹中添加角色
  persona_prompt: |
    你是一個自信又有點調皮的女性 AI VTuber，名字叫 Mili。
    你偶爾會吐槽，但語氣是輕鬆、可愛且不傷人的。

    你的風格：
    - 可以小小吐槽，但不能讓使用者感到被冒犯
    - 保持友善與樂於幫助
    - 回答要清楚、有用

    你的目標是讓對話有趣，同時幫助使用者解決問題。
  # 如果有填寫，system_prompt 會覆蓋上面的 persona_prompt 作為基礎 system prompt。
  system_prompt: "你是一個自信又有點調皮的女性 AI VTuber，名字叫 Mili。你偶爾會吐槽，但語氣輕鬆、可愛且不傷人。請保持友善與樂於助人，回答清楚、有用，並在適當時加入一點幽默感。你的目標是讓對話有趣，同時幫助使用者解決問題。"

  #  =================== LLM 後端設定 ===================

  agent_config:
    conversation_agent_choice: 'basic_memory_agent' # 對話代理选择

    agent_settings:
      basic_memory_agent:
        # 基础 AI 代理，没什么特别的。
        # 从 llm_config 中选择一个 llm 提供商
        # 并在相应的字段中設定所需的参数
        # 例如：
        # 'openai_compatible_llm', 'llama_cpp_llm', 'claude_llm', 'ollama_llm'
        # 'openai_llm', 'gemini_llm', 'zhipu_llm', 'deepseek_llm', 'groq_llm'
        # 'mistral_llm', 'lmstudio_llm' 之类的
        llm_provider: 'lmstudio_llm' # 使用的 LLM 提供商
        # 是否在第一句回應时遇上逗号就直接產生音訊以减少首句延迟（預設：True）
        faster_first_response: true
        # 句子分割方法：'regex' 或 'pysbd'
        segment_method: 'pysbd'
        # 是否使用 MCP（Model Context Protocol） Plus 以使 LLM 获得使用工具的能力（預設：False）
        # 'Plus' 意味着它包含了通过 OpenAI API 调用工具的能力。
        use_mcpp: false
        mcp_enabled_servers: ["time", "ddg-search"] # 启用的 MCP 服务器

      hume_ai_agent:
        api_key: ''
        host: 'api.hume.ai' # 一般无需更改
        config_id: '' # 可选
        idle_timeout: 15 # 閒置超时斷線的秒数

      # MemGPT 設定：MemGPT 暫時被移除
      ##

      letta_agent:
        host: 'localhost' #主機位址
        port: 8283 # 連接埠
        id: xxx #letta server執行的Agent的id编号
        faster_first_response: true
        # 句子分割方法：'regex' 或 'pysbd'
        segment_method: 'pysbd'
        # 一旦选择letta作为agent，那么实际執行时候的llm是在letta上設定的，因此使用者需要自己執行letta server
        # 有关更多詳細資訊，请查看他们的文档

    llm_configs:
      # 一个設定池，用于不同代理中使用的所有无状态 llm 提供商的凭据和连接詳細資訊

      # 无状态 LLM 模板 (对于非 ChatML 的 LLM, 通常而言不用管这个設定)
      stateless_llm_with_template:
        base_url: 'http://localhost:8080/v1'
        llm_api_key: 'somethingelse'
        organization_id:
        project_id:
        model: 'qwen2.5:latest'
        template: 'CHATML'
        temperature: 1.0 # value between 0 to 2
        interrupt_method: 'user'

      # OpenAI 兼容推理後端
      openai_compatible_llm:
        base_url: 'http://localhost:11434/v1' # 基礎 URL
        llm_api_key: 'somethingelse' # API 密钥
        organization_id:      # 组织 ID
        project_id:      # 项目 ID
        model: 'qwen2.5:latest' # 使用的模型
        temperature: 1.0 # 温度，介于 0 到 2 之间
        interrupt_method: 'user'
        # 用于表示中断信号的方法(提示詞模式)。
        # 如果LLM支持在聊天记忆中的任何位置插入系统提示詞，请使用'system'。
        # 否则，请使用'user'。您一般不需要更改此設定。

      # Claude API 設定
      claude_llm:
        base_url: 'https://api.anthropic.com' # 基礎 URL
        llm_api_key: 'YOUR API KEY HERE' # API 密钥
        model: 'claude-3-haiku-20240307' # 使用的模型

      llama_cpp_llm:
        model_path: '<path-to-gguf-model-file>' # GGUF 模型檔案路徑
        verbose: false # 是否输出詳細資訊

      ollama_llm:
        base_url: 'http://localhost:11434/v1' # 基礎 URL
        model: 'qwen2.5:latest' # 使用的模型
        temperature: 1.0 # 温度，介于 0 到 2 之间
        # 不活动后模型在内存中保留的时间（秒）
        # 設定为 -1 表示模型將永远保留在内存中（即使退出 open llm vtuber 之后也是）
        keep_alive: -1
        unload_at_exit: true # 退出时从内存中卸载模型

      lmstudio_llm:
        base_url: 'http://127.0.0.1:1234/v1'
        model: 'google/gemma-3-4b'
        temperature: 1   # value between 0 to 2

      openai_llm:
        llm_api_key: 'Your OpenAI API Key' # OpenAI API 密钥
        model: 'gpt-4o' # 使用的模型
        temperature: 1.0 # 温度，介于 0 到 2 之间

      gemini_llm:
        llm_api_key: 'gemini_api_key' # Gemini API 密钥
        model: 'gemini-3-flash-preview' # 使用的模型
        # model: 'gemini-2.0-flash-exp'
        temperature: 1.0 # 温度，介于 0 到 2 之间

      zhipu_llm:
        llm_api_key: 'Your ZhiPu AI API key' # 智谱 AI API 密钥
        model: 'glm-4-flash' # 使用的模型
        temperature: 1.0 # 温度，介于 0 到 2 之间

      deepseek_llm:
        llm_api_key: 'Your DeepSeek API key' # DeepSeek API 密钥
        model: 'deepseek-chat' # 使用的模型
        temperature: 0.7 # 注意，DeepSeek 的温度范围是 0 到 1

      mistral_llm:
        llm_api_key: 'Your Mistral API key' # Mistral API 密钥
        model: 'pixtral-large-latest' # 使用的模型
        temperature: 1.0 # 温度，介于 0 到 2 之间

      groq_llm:
        llm_api_key: 'your groq API key' # Groq API 密钥
        model: 'llama-3.3-70b-versatile' # 使用的模型
        temperature: 1.0 # 温度，介于 0 到 2 之间

  # === 自动語音辨識 ===
  asr_config:
    # 語音转文本模型选项：'faster_whisper', 'whisper_cpp', 'whisper', 'azure_asr', 'fun_asr', 'groq_whisper_asr', 'sherpa_onnx_asr'
    asr_model: 'sherpa_onnx_asr' # 使用的語音辨識模型

    azure_asr:
      api_key: 'api_key' # Azure API 密钥
      region: 'centralindia' # 区域
      languages: ['en-US', 'zh-TW']  # 要偵測的語言列表

    # Faster Whisper 設定
    faster_whisper:
      model_path: 'large-v3-turbo' # 模型路徑，模型名稱，或 hf hub 的模型 id
      download_root: 'models/whisper' # 模型下載根目录
      language: 'zh' # 語言，en、zh 或其他。留空表示自動偵測。
      device: 'auto' # 设备，cpu、cuda 或 auto。faster-whisper 不支持 mps
      compute_type: 'int8'
      prompt: '' # 提示詞，用于辅助生成正确的文本

    whisper_cpp:
      # 所有可用模型都列在 https://abdeladim-s.github.io/pywhispercpp/#pywhispercpp.constants.AVAILABLE_MODELS
      model_name: 'small' # 模型名稱
      model_dir: 'models/whisper' # 模型目录
      print_realtime: false # 是否实时打印
      print_progress: false # 是否打印进度
      language: 'auto' # 語言，en、zh、auto
      prompt: '' # 提示詞，用于辅助生成正确的文本

    whisper:
      name: 'medium' # 模型名稱
      download_root: 'models/whisper' # 模型下載根目录
      device: 'cpu' # 设备
      prompt: '' # 提示詞，用于辅助生成正确的文本

    # FunASR 目前需要在啟動时连接互联网以下載/检查模型。您可以在初始化后断开互联网连接。
    # 或者您可以使用 sherpa onnx asr 或 Faster-Whisper 获得完全离线的体验
    fun_asr:
      model_name: 'iic/SenseVoiceSmall' # 或 'paraformer-zh'
      vad_model: 'fsmn-vad' # 仅当音訊长度超过 30 秒时才需要使用
      punc_model: 'ct-punc' # 標點符號模型
      device: 'cpu' # 设备
      disable_update: true # 是否每次啟動时都检查 FunASR 更新
      ncpu: 4 # CPU 内部操作的執行緒數
      hub: 'ms' # ms（預設）从 ModelScope 下載模型。使用 hf 从 Hugging Face 下載模型。
      use_itn: false # 是否使用数字格式转换
      language: 'auto' # zh, en, auto

    # pip install sherpa-onnx
    # 文档：https://k2-fsa.github.io/sherpa/onnx/index.html
    # ASR 模型下載：https://github.com/k2-fsa/sherpa-onnx/releases/tag/asr-models
    sherpa_onnx_asr:
      model_type: 'sense_voice' # 'transducer', 'paraformer', 'nemo_ctc', 'wenet_ctc', 'whisper', 'tdnn_ctc'
      # 根据 model_type 选择以下其中一个：
      # --- 对于 model_type: 'transducer' ---
      # encoder: ''        # 编码器模型路徑（例如 'path/to/encoder.onnx'）
      # decoder: ''        # 解码器模型路徑（例如 'path/to/decoder.onnx'）
      # joiner: ''         # 连接器模型路徑（例如 'path/to/joiner.onnx'）
      # --- 对于 model_type: 'paraformer' ---
      # paraformer: ''     # paraformer 模型路徑（例如 'path/to/model.onnx'）
      # --- 对于 model_type: 'nemo_ctc' ---
      # nemo_ctc: ''        # NeMo CTC 模型路徑（例如 'path/to/model.onnx'）
      # --- 对于 model_type: 'wenet_ctc' ---
      # wenet_ctc: ''       # WeNet CTC 模型路徑（例如 'path/to/model.onnx'）
      # --- 对于 model_type: 'tdnn_ctc' ---
      # tdnn_model: ''      # TDNN CTC 模型路徑（例如 'path/to/model.onnx'）
      # --- 对于 model_type: 'whisper' ---
      # whisper_encoder: '' # Whisper 编码器模型路徑（例如 'path/to/encoder.onnx'）
      # whisper_decoder: '' # Whisper 解码器模型路徑（例如 'path/to/decoder.onnx'）
      # --- 对于 model_type: 'sense_voice' ---
      # SenseVoice 我写了自动下載模型的逻辑，其他模型要自己手动下載
      sense_voice: './models/sherpa-onnx-sense-voice-zh-en-ja-ko-yue-2024-07-17/model.int8.onnx' # SenseVoice 模型路徑（例如 'path/to/model.onnx'）
      tokens: './models/sherpa-onnx-sense-voice-zh-en-ja-ko-yue-2024-07-17/tokens.txt' # tokens.txt 路徑（所有模型类型都需要）
      # --- 可选参数（顯示預設值）---
      # hotwords_file: ''     # 热词檔案路徑（如果使用热词）
      # hotwords_score: 1.5   # 热词分数
      # modeling_unit: ''     # 热词的建模单元（如果适用）
      # bpe_vocab: ''         # BPE 词汇表路徑（如果适用）
      num_threads: 4 # 執行緒數
      # whisper_language: '' # Whisper 模型的語言（例如 'en'、'zh' 等 - 如果使用 Whisper）
      # whisper_task: 'transcribe'  # Whisper 模型的任务（'transcribe' 或 'translate' - 如果使用 Whisper）
      # whisper_tail_paddings: -1   # Whisper 模型的尾部填充（如果使用 Whisper）
      # blank_penalty: 0.0    # 空白符号的惩罚
      # decoding_method: 'greedy_search'  # 'greedy_search' 或 'modified_beam_search'
      # debug: False # 启用除錯模式
      # sample_rate: 16000 # 采样率（应与模型预期的采样率匹配）
      # feature_dim: 80       # 特征维度（应与模型预期的特征维度匹配）
      use_itn: true # 对 SenseVoice 模型启用 ITN（如果不是 SenseVoice 模型，则应設定为 False）
      # 推理平台（cpu 或 cuda）(cuda 需要额外設定，请参考文档)
      provider: 'cpu'

    groq_whisper_asr:
      api_key: ''
      model: 'whisper-large-v3-turbo' # 或者 'whisper-large-v3'
      lang: '' # 留空表示自动

  # =================== 文字轉語音 ===================
  tts_config:
    tts_model: 'azure_tts' # 使用的文字轉語音模型
    # 文字轉語音模型选项：
    #   'azure_tts', 'pyttsx3_tts', 'edge_tts', 'bark_tts',
    #   'cosyvoice_tts', 'melo_tts', 'coqui_tts',
    #   'fish_api_tts', 'x_tts', 'gpt_sovits_tts', 'sherpa_onnx_tts'
    #   'minimax_tts'

    siliconflow_tts:
      api_url: "https://api.siliconflow.cn/v1/audio/speech"
      api_key: "your key"  # 用于身份验证的API密钥
      default_model: "FunAudioLLM/CosyVoice2-0.5B"  # 預設使用的文字轉語音模型
      default_voice: "speech:Dreamflowers:5bdstvc39i:xkqldnpasqmoqbakubom your voice name"  # 預設語音設定，格式为："speech:模型名稱:音色ID:您的語音名稱"
      sample_rate: 32000  # 音訊采样率（单位：Hz），不同格式支持的采样率不同：opus支持48000Hz；wav/pcm支持8000、16000、24000、32000、44100Hz（預設44100Hz）；mp3支持32000、44100Hz（預設44100Hz）
      response_format: "mp3"  # 输出音訊格式，支持mp3、opus、wav、pcm
      stream: true
      speed: 1
      gain: 0

    azure_tts:
      api_key: 'azure_api_key' # Azure API 密钥
      region: 'centralindia' # 区域
      voice: 'zh-TW-HsiaoChenNeural' # 語音
      pitch: '26' # 音调调整百分比
      rate: '1.5' # 语速

    bark_tts:
      voice: 'v2/en_speaker_1' # 語音

    edge_tts:
      # 查看文档：https://github.com/rany2/edge-tts
      # 使用 `edge-tts --list-voices` 列出所有可用語音
      voice: 'zh-TW-HsiaoYuNeural' # 'en-US-AvaMultilingualNeural' #'zh-CN-XiaoxiaoNeural' # 'ja-JP-NanamiNeural'

    # pyttsx3_tts 没有任何設定。

    cosyvoice_tts: # Cosy Voice TTS 連接到 gradio webui
      # 查看他们的文档以了解部署和以下設定的含義
      client_url: 'http://127.0.0.1:50000/' # CosyVoice gradio 演示 webui url
      mode_checkbox_group: '预训练音色' # 模式核取方塊组
      sft_dropdown: '中文女' # 微调下拉列表
      prompt_text: '' # 提示文本
      prompt_wav_upload_url: 'https://github.com/gradio-app/gradio/raw/main/test/test_files/audio_sample.wav' # 提示 wav 上傳 url
      prompt_wav_record_url: 'https://github.com/gradio-app/gradio/raw/main/test/test_files/audio_sample.wav' # 提示 wav 錄製 url
      instruct_text: '' # 指令文本
      seed: 0 # 种子
      api_name: '/generate_audio' # API 名稱

    cosyvoice2_tts: # Cosy Voice TTS 連接到 gradio webui
      # 查看他们的文档以了解部署和以下設定的含義
      client_url: 'http://127.0.0.1:50000/' # CosyVoice gradio 演示 webui url
      mode_checkbox_group: '预训练音色' # 模式核取方塊组, 可选项: '预训练音色', '3s极速复刻', '跨语种复刻', '自然語言控制'
      sft_dropdown: '中文女' # 微调下拉列表
      prompt_text: '' # 提示文本
      prompt_wav_upload_url: 'https://github.com/gradio-app/gradio/raw/main/test/test_files/audio_sample.wav' # 提示 wav 上傳 url
      prompt_wav_record_url: 'https://github.com/gradio-app/gradio/raw/main/test/test_files/audio_sample.wav' # 提示 wav 錄製 url
      instruct_text: '' # 指令文本
      stream: false # 流式生成
      seed: 0 # 种子
      speed: 1.0 # 语速
      api_name: '/generate_audio' # API 名稱

    melo_tts:
      speaker: 'EN-Default' # ZH
      language: 'EN' # ZH
      device: 'auto' # 您可以手动將其設定为 'cpu'、'cuda'、'cuda:0' 或 'mps'
      speed: 1.0 # 语速

    x_tts:
      api_url: 'http://127.0.0.1:8020/tts_to_audio' # API URL
      speaker_wav: 'female' # 說話人 WAV 檔案
      language: 'en' # 語言

    gpt_sovits_tts:
      # 將参考音訊放到 GPT-Sovits 的根路徑，或在此处設定路徑
      api_url: 'http://127.0.0.1:9880/tts' # API URL
      text_lang: 'zh' # 文本語言
      ref_audio_path: '' # str.(必需) 参考音訊的路徑
      prompt_lang: 'zh' # str.(必需) 参考音訊提示文本的語言
      prompt_text: '' # str.(可选) 参考音訊的提示文本
      text_split_method: 'cut5' # 文本分割方法
      batch_size: '1' # 批处理大小
      media_type: 'wav' # 媒体类型
      streaming_mode: 'false' # 流模式

    fish_api_tts:
      # Fish TTS API 的 API 密钥。
      api_key: ''
      # 要使用的語音的参考 ID。在 [Fish Audio 网站](https://fish.audio/) 上获取。
      reference_id: ''
      # 'normal' 或 'balanced'。balanced 更快但质量较低。
      latency: 'balanced' # 延迟
      base_url: 'https://api.fish.audio' # 基礎 URL

    coqui_tts:
      # 要使用的 TTS 模型的名稱。如果为空，將使用預設模型
      # 执行 'tts --list_models' 以列出 coqui-tts 支持的模型
      # 一些示例：
      # - 'tts_models/en/ljspeech/tacotron2-DDC'（单說話人）
      # - 'tts_models/zh-CN/baker/tacotron2-DDC-GST'（中文单說話人）
      # - 'tts_models/multilingual/multi-dataset/your_tts'（多說話人）
      # - 'tts_models/multilingual/multi-dataset/xtts_v2'（多說話人）
      model_name: 'tts_models/en/ljspeech/tacotron2-DDC' # 模型名稱
      speaker_wav: '' # 說話人 WAV 檔案
      language: 'en' # 語言
      device: '' # 设备

    # pip install sherpa-onnx
    # 文档：https://k2-fsa.github.io/sherpa/onnx/index.html
    # TTS 模型下載：https://github.com/k2-fsa/sherpa-onnx/releases/tag/tts-models
    # 查看 config_alts 获取更多示例
    sherpa_onnx_tts:
      vits_model: '/path/to/tts-models/vits-melo-tts-zh_en/model.onnx' # VITS 模型檔案路徑
      vits_lexicon: '/path/to/tts-models/vits-melo-tts-zh_en/lexicon.txt' # 詞典檔案路徑（可选）
      vits_tokens: '/path/to/tts-models/vits-melo-tts-zh_en/tokens.txt' # 标记檔案路徑
      vits_data_dir: '' # '/path/to/tts-models/vits-piper-en_GB-cori-high/espeak-ng-data'  # espeak-ng 数据路徑（可选）
      vits_dict_dir: '/path/to/tts-models/vits-melo-tts-zh_en/dict' # Jieba 字典路徑（可选，用于中文）
      tts_rule_fsts: '/path/to/tts-models/vits-melo-tts-zh_en/number.fst,/path/to/tts-models/vits-melo-tts-zh_en/phone.fst,/path/to/tts-models/vits-melo-tts-zh_en/date.fst,/path/to/tts-models/vits-melo-tts-zh_en/new_heteronym.fst' # 规则 FST 檔案路徑（可选）
      max_num_sentences: 2 # 每批最大句子数（或 -1 表示全部）
      sid: 1 # 說話人 ID（对于多說話人模型）
      provider: 'cpu' # 使用 'cpu'、'cuda'（GPU）或 'coreml'（Apple）
      num_threads: 1 # 計算執行緒數
      speed: 1.0 # 语速（1.0 为正常）
      debug: false # 启用除錯模式（True/False）
    spark_tts:
      api_url: 'http://127.0.0.1:6006/' # 初始API地址，使用gradio自带的前端API。地址：https://github.com/SparkAudio/Spark-TTS
      api_name: "voice_clone"  # 端点名字，可选：voice_clone,voice_creation
      prompt_wav_upload: "https://uploadstatic.mihoyo.com/ys-obc/2022/11/02/16576950/4d9feb71760c5e8eb5f6c700df12fa0c_6824265537002152805.mp3" # 参考音訊地址,api_name: = "voice_clone"时填写
      gender: "female"  # 生成声线，api_name: = "voice_creation"时填写
      pitch: 3  # 音高，api_name: = "voice_creation"时填写
      speed: 3  # 语速，api_name: = "voice_creation"时填写

    openai_tts: # OpenAI 兼容的 TTS（語音合成）接口設定
      # 如果提供了这些設定，將覆盖 openai_tts.py 檔案中的預設值
      model: 'kokoro' # 服务器预期使用的模型名稱（例如 'tts-1'，'kokoro'）
      voice: 'af_sky+af_bella' # 服务器预期使用的聲音名稱（例如 'alloy'，'af_sky+af_bella'）
      api_key: 'not-needed' # 如果服务器需要，可填写 API 密钥
      base_url: 'http://localhost:8880/v1' # TTS 服务器的基礎 URL 地址
      file_extension: 'mp3' # 音訊檔案格式（'mp3' 或 'wav'）
    # 详细文档见：https://platform.minimaxi.com/document/Announcement
    minimax_tts:
      group_id: '' # minimax 的 group_id
      api_key: '' # minimax 的 api_key
      # 支持的模型: 'speech-02-hd', 'speech-02-turbo'（推荐使用 'speech-02-turbo'）
      model: 'speech-02-turbo' # minimax 模型名稱
      voice_id: 'female-shaonv' # minimax 語音 id，預設 'female-shaonv'
      # 自定义发音字典，預設为空。
      # 示例: '{"tone": ["测试/(ce4)(shi4)", "危险/dangerous"]}'
      pronunciation_dict: ''

  # =================== Voice Activity Detection ===================
  vad_config:
    vad_model:

    silero_vad:
      orig_sr: 16000 # 原始音訊采样率
      target_sr: 16000 # 目標音訊采样率
      prob_threshold: 0.4 # 語音活动偵測的概率阈值
      db_threshold: 60 # 語音活动偵測的分贝阈值
      required_hits: 3 # 连续命中次数以确认語音
      required_misses: 24 # 连续未命中次数以确认静音
      smoothing_window: 5 # 語音活动偵測的平滑窗口大小

  tts_preprocessor_config:
    # 关于进入 TTS 的文本预处理的設定

    remove_special_char: true # 从音訊生成中删除表情符号等特殊字符
    ignore_brackets: true # 从音訊生成中删除中括号包住的内容
    ignore_parentheses: true # 从音訊生成中删除括号包住的内容
    ignore_asterisks: true # 从音訊生成中删除星号包住的内容(单双星号)
    ignore_angle_brackets: true # 从音訊生成中删除尖括号包住的内容

    translator_config:
      # 比如...你说话并阅读英语字幕，而 TTS 说日语之类的
      translate_audio: false # 警告：请确保翻译引擎設定成功再开启此选项，否则会翻译失败
      translate_provider: 'deeplx' # 翻译提供商, 目前支持 deeplx 或 tencent

      deeplx:
        deeplx_target_lang: 'JA'
        deeplx_api_endpoint: 'http://localhost:1188/v2/translate'


      #  腾讯文本翻译  每月500万字符  记得关闭后付费,需要手动前往 机器翻译控制台 > 系统設定 关闭
      #   https://cloud.tencent.com/document/product/551/35017
      #   https://console.cloud.tencent.com/cam/capi
      tencent:
        secret_id: ''
        secret_key: ''
        region: 'ap-guangzhou'
        source_lang: 'zh'
        target_lang: 'ja'

# 直播平台集成
live_config:
  bilibili_live:
    # 要監控的B站直播间ID列表（直播间URL中的数字）
    room_ids: [1991478060]
    # SESSDATA cookie值（可选，用于驗證请求，可以查看发送弹幕使用者名）
    sessdata: ""
